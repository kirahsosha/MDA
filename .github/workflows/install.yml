name: install

env:
  # 版本控制：
  # - 设置 VERSION 为空字符串时，下载 latest 版本
  # - 设置 VERSION 为具体版本号时（如 v1.2.3），下载指定版本
  MAAFW_VERSION: ""
  MXU_VERSION: ""

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "agent/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "agent/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ${{ matrix.os == 'win' && 'windows-latest' || (matrix.os == 'macos' &&
      'macos-latest' || 'ubuntu-latest') }}
    strategy:
      matrix:
        os: [ win, macos, linux ]
        arch: [ x86_64, aarch64 ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "agent/go-service/go.mod"
          cache-dependency-path: |
            agent/go-service/go.mod
            agent/go-service/go.sum

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: "deps"
          extract: true

      - name: Download MXU
        if: ${{ !(matrix.os == 'linux' && matrix.arch == 'aarch64') }}
        id: download_mxu
        uses: robinraju/release-downloader@v1
        with:
          repository: MistEO/MXU
          fileName: "*${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MXU_VERSION == '' }}
          tag: ${{ env.MXU_VERSION }}
          out-file-path: "MXU"
          extract: true

      - name: Clean up MXU archive
        if: ${{ !(matrix.os == 'linux' && matrix.arch == 'aarch64') }}
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mxu.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MXU."

      - name: Clean install directory
        shell: bash
        run: |
          rm -rf install/
          echo "Install directory cleaned."

      - name: Build Go Agent
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py --build-go-only ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - name: Install
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - name: Integrate MXU into install directory
        if: ${{ !(matrix.os == 'linux' && matrix.arch == 'aarch64') }}
        shell: bash
        run: |
          python tools/mxu_integration.py --mxu-root MXU --install-root install

      - name: Convert PNG to ICO
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          choco install imagemagick -y
          magick convert assets/logo.png -define icon:auto-resize=256,128,64,48,32,24,16 MDA.ico
          cp MDA.ico install/logo.ico

      - name: Modify MXU exe icon
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          curl -L https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe
          if [ -f "install/MDA.exe" ]; then
            ./rcedit.exe "install/MDA.exe" --set-icon "MDA.ico"
            echo "MXU icon modified successfully"
          elif [ -f "install/mxu.exe" ]; then
            ./rcedit.exe "install/mxu.exe" --set-icon "MDA.ico"
            echo "MXU icon modified successfully"
          else
            echo "MXU exe not found, skipping icon update."
          fi

      - name: Verify install contents
        shell: bash
        run: |
          echo "Checking install directory contents..."
          ls -la install/ | head -20
          if [[ "${{ matrix.os }}" == "win" ]]; then
            if [ -f "install/MDA.exe" ]; then
              echo "✅ MDA.exe found"
            else
              echo "❌ MDA.exe NOT found"
              exit 1
            fi
          fi
          if [ -f "install/interface.json" ]; then
            echo "✅ interface.json found"
          else
            echo "❌ interface.json NOT found"
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: MDA-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}
          path: "install"
          retention-days: 1

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header ${{ needs.meta.outputs.is_prerelease ==
            'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [ meta, install, changelog ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd "$f" && zip -r "../$f.zip" .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
      - name: Trigger MirrorChyanUploading
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
